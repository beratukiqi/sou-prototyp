<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My App — Versions</title>
  <style>
    :root {
      --bg: #fafafa;
      --fg: #1a1a1a;
      --muted: #666;
      --accent: #2563eb;
      --card: #fff;
      --border: #e5e5e5;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111;
        --fg: #f5f5f5;
        --muted: #999;
        --accent: #60a5fa;
        --card: #1a1a1a;
        --border: #2a2a2a;
      }
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      margin: 0;
      padding: 2rem 1rem;
      line-height: 1.5;
    }
    main {
      max-width: 640px;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 0.25rem;
      font-size: 2rem;
    }
    .subtitle {
      color: var(--muted);
      margin: 0 0 2rem;
    }
    .versions {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .versions a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: var(--fg);
      transition: border-color 0.15s, transform 0.15s;
    }
    .versions a:hover {
      border-color: var(--accent);
      transform: translateX(2px);
    }
    .label {
      font-weight: 600;
    }
    .badge {
      font-size: 0.75rem;
      background: var(--accent);
      color: white;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      margin-left: 0.5rem;
      vertical-align: middle;
    }
    .meta {
      color: var(--muted);
      font-size: 0.875rem;
      margin-top: 10px;
    }
    .empty, .error {
      color: var(--muted);
      text-align: center;
      padding: 2rem;
    }
    .error { color: #dc2626; }
  </style>
</head>
<body>
  <main>
    <h1>Sök mål - Prototyper</h1>
    <p class="subtitle">Klicka på valfri version för att öppna prototypen.</p>
    <ul class="versions" id="versions">
      <li class="empty">Loading…</li>
    </ul>
  </main>

  <script>
    fetch('versions.json?t=' + Date.now())
      .then(r => {
        if (!r.ok) throw new Error('Could not load versions.json');
        return r.json();
      })
      .then(versions => {
        const list = document.getElementById('versions');
        if (!versions.length) {
          list.innerHTML = '<li class="empty">No versions yet.</li>';
          return;
        }
        list.innerHTML = versions.map((v, i) => `
          <li>
            <a href="./${v.id}/">
              <span>
                <span class="label">${v.label}</span>
                ${i === 0 ? '<span class="badge">Senaste</span>' : ''}
                ${v.note ? `<div class="meta">${v.note}</div>` : ''}
              </span>
              <span class="meta">${v.date || ''}</span>
            </a>
          </li>
        `).join('');
      })
      .catch(err => {
        document.getElementById('versions').innerHTML =
          `<li class="error">Failed to load versions: ${err.message}</li>`;
      });
  </script>
</body>
</html>
